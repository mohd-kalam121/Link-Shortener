<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            background: white;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 850px;
        }
        h1 { margin-top: 0; font-size: 26px; color: #2d3748; margin-bottom: 10px; }
        .nav-link { display: inline-block; margin-bottom: 25px; color: #667eea; text-decoration: none; font-weight: 600; }
        .nav-link:hover { text-decoration: underline; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 16px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background-color: #f8fafc; color: #4a5568; font-weight: 700; text-transform: uppercase; font-size: 13px; letter-spacing: 0.5px; }
        tr:hover { background-color: #f1f5f9; }
        td a { color: #667eea; font-weight: 600; text-decoration: none; }
        td a:hover { text-decoration: underline; }
        .url-cell { max-width: 350px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #718096; }
        .badge { background: #667eea; color: white; padding: 6px 12px; border-radius: 20px; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Link Analytics Dashboard</h1>
        <a href="/" class="nav-link">← Back to Generator</a>
        
        <table>
            <thead>
                <tr>
                    <th>Short Code</th>
                    <th>Original Destination</th>
                    <th>Total Clicks</th>
                </tr>
            </thead>
            <tbody>
                {% for code, data in links.items() %}
                <tr>
                    <td><a href="/s/{{ code }}" target="_blank">/s/{{ code }}</a></td>
                    <td class="url-cell" title="{{ data.original_url }}">{{ data.original_url }}</td>
                    <td><span class="badge">{{ data.clicks }}</span></td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="3" style="text-align: center; color: #a0aec0; padding: 40px; font-style: italic;">No links generated yet. Time to shorten some!</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
